<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemoryOS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      min-height: 200px;
      background: #0f0f0f;
      color: #efefef;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    .logo {
      width: 28px; height: 28px;
      background: #7c3aed;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .brand { font-size: 14px; font-weight: 500; color: #efefef; }
    .body { padding: 16px; space-y: 12px; }
    .url-preview {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: #999;
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    input {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 8px 12px;
      color: #efefef;
      font-size: 13px;
      outline: none;
      margin-bottom: 8px;
    }
    input:focus { border-color: #444; }
    input::placeholder { color: #555; }
    button {
      width: 100%;
      padding: 9px;
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
    }
    .status.success { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .status.error { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🧠</div>
    <span class="brand">MemoryOS</span>
  </div>
  <div class="body" style="padding:16px">
    <div class="url-preview" id="current-url">Loading...</div>
    <input id="title-input" type="text" placeholder="Title" />
    <input id="tags-input" type="text" placeholder="Tags (comma-separated)" />
    <button id="save-btn">Save to Brain</button>
    <div id="status" class="status" style="display:none"></div>
  </div>
  <script src="popup/popup.js"></script>
</body>
</html>
